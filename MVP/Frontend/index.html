<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function(){
        var t=localStorage.getItem('theme');
        if(t==='dark'||(t===null&&window.matchMedia('(prefers-color-scheme: dark)').matches)){
          document.documentElement.setAttribute('data-theme','dark');
        }
      })();
    </script>
    <meta name="description" content="MeetingAI — Transformez vos réunions en insights actionnables grâce à l'IA." />
    <title>MeetingAI — Assistant IA de Réunions</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
